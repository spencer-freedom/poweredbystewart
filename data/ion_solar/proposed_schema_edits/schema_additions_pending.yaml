  2. `coaching_philosophy_addition.verbal_discipline` gets pasted under the
     existing `coaching_philosophy:` section as a new sibling sub-section
     (alongside bill_anchoring, curiosity_over_features, multi_angle_resilience,
     setter_scope_discipline).

  3. The classification enum in `scripts/stewart_demo_pipeline/tools.py`
     STAGE3_TRAJECTORY_TOOL already has all 8 new categories (added 2026-05-22).
     No code change needed when codex updates.

  4. Optional: rerun a sample (50 calls?) against the expanded codex to verify
     the new categories are getting picked up and the "other" classification
     rate drops from current ~20% to a more reasonable ~5-10%.

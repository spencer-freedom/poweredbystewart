# ============================================================================
# 16. LLM CONTEXT INJECTION  —  Shapes how the model interprets calls
# ============================================================================

llm_context_injection:

  industry_briefing: |
    This is a residential solar appointment-setter call at ION Solar. The
    setter's job is to book a 30-minute phone appointment with a closer
    (called a "consultant"). The setter is NOT trying to sell solar — they're
    trying to gather qualification info and create curiosity. Customers typically:
    - Are 45-70 year old homeowners
    - Are skeptical (solar has a scam reputation due to door-to-door)
    - Have 1-3 competing quotes already
    - Are motivated primarily by bill pain
    - Often need spouse/co-decider involved
    - Need legitimacy established quickly

  what_great_looks_like: |
    # PARTIAL — populated from corpus + script. TBD with Kenny.
    # Final version sources from Kenny's recorded coaching sessions OR
    # real Ion calls Kenny designates as source-of-truth exemplars.
    A great ION setter call:
    - Establishes legitimacy in first 30 seconds (often via Tesla framing)
    - Completes verify section gracefully
    - Anchors AND flips the bill into emotional alignment-against-utility
    - Creates curiosity instead of explaining solar
    - Identifies and includes spouse/co-decider in appointment
    - Follows protocols correctly (does not argue spouse request)
    - Holds firm on hard rules (proposal-before-meeting)
    - Sets clear expectations for the appointment
    - Routes cross-sell signals (roofing) to the appropriate team
    - Holds setter scope — bridges to specialist for closer-tier questions
    - Sends personalized text follow-up with tieback

  what_failure_looks_like: |
    # PARTIAL — populated from corpus. TBD with Kenny.
    A failing ION setter call:
    - Rushes past the intro / fails to establish legitimacy
    - Skips Verify checkboxes or interrogates instead of conversing
    - Captures the bill as data but doesn't flip emotionally
    - Over-explains solar features (creates objections to handle)
    - Argues with spouse-coordination protocol
    - Caves on proposal-before-meeting hard rule
    - Scope creep — debates technical content the specialist handles
    - Misses cross-sell signals (roof replacement → no bridge)
    - Books appointment without time/computer/no-driving anchor
    - Sends generic text without tieback

  # POPULATED — locked from Spencer's discussion
  numeric_discipline: |
    You may quote numbers spoken by the customer or rep in the call.
    You may quote numbers in this schema's context section.
    You may NOT invent, estimate, range, or imply savings, percentages,
    timeframes, or any quantitative claim not grounded above.
    Prescriptive alternatives use INTENT and EMOTION as leverage,
    NOT numbers. The pain the number represents is the leverage.
    The number itself has no feelings.
    When a flip or alternative would be sharper with a number that isn't
    grounded, FLAG it: "this leverage point would land harder if the rep
    knew the actual range — coaching gap on financials." Don't fill the
    gap with fiction.

  strategy_recognition: |
    When evaluating rep responses, look for STRATEGY MATCH, not VERBATIM MATCH.
    Reps may execute a schema-defined strategy (curiosity_creation,
    bill_swap_reframe, spouse_inclusion, objection_inversion, etc.) using
    their own phrasing. Mark strategy-aligned variants as schema-compliant.
    Only mark as deviation when the strategy itself is wrong, not when the
    words differ.

  handoff_brief_discipline: |
    The handoff brief is context for the closer, NOT a script. Mark which
    facts are stable vs volatile. Mark which promises the closer must
    honor. Identify leverage moves the setter left on the table that the
    closer can pick up. NEVER frame the brief in a way that locks the
    closer's approach — they read the customer fresh; the brief informs
    but does not dictate.

# ============================================================================
# 17. ANALYSIS DIRECTIVES  —  What Stage 3 looks for
# (NEW SECTION — built up through corpus reads.
#  Each directive surfaces a Stewart capability.)
# ============================================================================

analysis_directives:

  # Trajectory and intent reading
  - id: customer_state_trajectory
    instruction: "Walk through the call in 5 phases. Identify customer's starting state, rep's apparent intent, customer state changes with timestamps + quotes, recurring patterns, trajectory verdict."

  - id: strategic_vs_reactive
    instruction: "For each moment that looks like failed objection handling, generate two hypotheses: (a) the rep failed; (b) the rep is intentionally deferring to set up a later move. Choose with evidence."

  # Schema adherence and gaps
  - id: scope_creep_detection
    instruction: "Count instances where setter engages in closer-tier content beyond what's needed to schedule. High count = top training priority."

  - id: protocol_adherence
    instruction: "Per the protocols section, were procedures followed? Specifically: spouse-on-title coordination, hello-objection small-ask, time-question anchor, adult-child decision-maker inclusion."

  - id: rebuttal_strategy_match
    instruction: "When rep handles a script-defined objection, score at the STRATEGY level, not verbatim. Mark strategy-aligned variants as compliant."

  - id: schema_drift_detection
    instruction: "When rep states numbers/thresholds that don't match the schema (e.g., credit threshold), flag for reconciliation."

  # Leverage moves (positive AND negative signals)
  - id: friction_resolution_speed
    instruction: "Non-business complaints (emails, contact frequency, harassment perception): did rep solve, defend, or dismiss? Time-from-complaint to resolved-state."

  - id: trust_building_micro_trades
    instruction: "Moments where rep substitutes an impersonal/automated process for a personal commitment. High-leverage on suspicious customers."

  - id: bill_anchor_depth
    instruction: "Was the bill captured AND emotionally flipped (alignment-against-utility), or captured-and-dropped? Bill capture alone is necessary but not sufficient."

  - id: flip_opportunity_detection
    instruction: "Cost/time/interest objection raised, rep handled safely, but flip was available per coaching_philosophy.objection_inversion. Flag and generate the alternative (no fabricated numbers)."

  - id: cross_sell_signal_detection
    instruction: "Customer mentions a need for any service Ion offers beyond solar (roofing, batteries, etc.). Flag for cross-routing AND assess whether rep bridged correctly."

  - id: knowledge_gap_handling
    instruction: "When rep doesn't have an answer: did they (a) dodge and redirect, (b) admit and recover with transparency, (c) fabricate? Each has different coaching implications."

  - id: vulnerability_disclosure_handling
    instruction: "Customer shares health, financial, family, or life vulnerability. Was response empathetic + bridged, acknowledged-and-moved-on, or ignored? This is a TRUST GIFT classification."

  - id: tech_friction_handling
    instruction: "Customer can't navigate phone/can't send photo. Did rep pivot to verbal readback within 2 minutes or burn 8-15 minutes? Schema gap if not pivoted."

  - id: scam_anxiety_signal
    instruction: "Customer references being scammed / suspicious of door-knockers. Generate appointment-reframe to anchor as customer-initiated."

  - id: guilt_as_objection_detection
    instruction: "Polite 'I don't want to waste your time' is a soft refusal. Reframe as customer-in-control."

  - id: time_burn_detection
    instruction: "Disproportionate time on low-value activity. Flag efficiency gap."

  - id: conditional_booking_detection
    instruction: "Appointments scheduled with explicit constraints (anxiety, channel preferences, decision-maker exclusions). Generate handoff brief covering these."

  - id: soft_outcome_distinction
    instruction: "Callbacks WITH locked times vs 'we'll touch base.' Major delta on no-show rate."

  # Output generation
  - id: handoff_brief_generation
    instruction: "For every tentative_appointment or booked outcome, generate a brief per handoff_brief_discipline structure."

  - id: outcome_reclassification
    instruction: "If v1 outcome tag doesn't match observed trajectory, flag reclassification with reasoning."

  - id: per_rep_pattern_aggregation
    instruction: "Track per-rep patterns over time. Same rep may be strong on one move and weak on another. Coaching becomes targeted, not blanket."

